<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitcoin Chain Analysis</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.29.2/cytoscape.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #e6edf3; font-family: system-ui, sans-serif; min-height: 100vh; }
    header { padding: 1.5rem 2rem; border-bottom: 1px solid #21262d; display: flex; align-items: center; gap: 0.75rem; }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    .btc-icon { color: #f7931a; font-size: 1.5rem; }
    main { max-width: 1100px; margin: 0 auto; padding: 2rem; }
    .search-bar { display: flex; gap: 0.75rem; margin-bottom: 0.5rem; }
    .search-bar input { flex: 1; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 0.75rem 1rem; color: #e6edf3; font-size: 0.95rem; outline: none; }
    .search-bar input:focus { border-color: #f7931a; }
    .search-bar button { background: #f7931a; border: none; border-radius: 8px; padding: 0.75rem 1.5rem; color: #0d1117; font-weight: 600; cursor: pointer; font-size: 0.95rem; }
    .search-bar button:hover { background: #e8861a; }
    .error-msg { color: #f85149; font-size: 0.85rem; min-height: 1.4em; margin-bottom: 1rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: #161b22; border: 1px solid #21262d; border-radius: 10px; padding: 1.25rem; }
    .stat-card .label { font-size: 0.75rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .stat-card .value { font-size: 1.4rem; font-weight: 700; color: #f7931a; }
    .stat-card .unit { font-size: 0.75rem; color: #8b949e; margin-left: 0.25rem; }
    .tabs { display: flex; border-bottom: 1px solid #21262d; margin-bottom: 1.5rem; }
    .tab-btn { background: none; border: none; border-bottom: 2px solid transparent; color: #8b949e; padding: 0.75rem 1.5rem; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
    .tab-btn.active { color: #f7931a; border-bottom-color: #f7931a; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    #graph-container { height: 500px; background: #161b22; border: 1px solid #21262d; border-radius: 10px; }
    table { width: 100%; border-collapse: collapse; background: #161b22; border-radius: 10px; overflow: hidden; border: 1px solid #21262d; }
    th { padding: 0.75rem 1rem; text-align: left; font-size: 0.75rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #21262d; }
    td { padding: 0.75rem 1rem; font-size: 0.875rem; border-bottom: 1px solid #21262d; }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .badge.received { background: #1a3a2a; color: #22c55e; }
    .badge.sent { background: #3a1a1a; color: #ef4444; }
    .txid-link { color: #58a6ff; text-decoration: none; font-family: monospace; font-size: 0.8rem; }
    .txid-link:hover { text-decoration: underline; }
    .amount.received { color: #22c55e; }
    .amount.sent { color: #ef4444; }
    .empty-state { text-align: center; padding: 3rem; color: #8b949e; }
    .spinner { display: none; text-align: center; padding: 2rem; color: #8b949e; }
  </style>
</head>
<body>
  <header>
    <span class="btc-icon">&#8383;</span>
    <h1>Bitcoin Chain Analysis</h1>
  </header>
  <main>
    <div class="search-bar">
      <input type="text" id="addr-input" placeholder="Inserisci un indirizzo Bitcoin (es. bc1q...)" />
      <button onclick="search()">Analizza</button>
    </div>
    <div class="error-msg" id="error-msg"></div>

    <div class="spinner" id="spinner">Caricamento...</div>

    <div id="stats-section" style="display:none">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="label">Saldo</div>
          <div class="value" id="stat-balance">—</div>
          <span class="unit">BTC</span>
        </div>
        <div class="stat-card">
          <div class="label">Ricevuto</div>
          <div class="value" id="stat-received">—</div>
          <span class="unit">BTC</span>
        </div>
        <div class="stat-card">
          <div class="label">Inviato</div>
          <div class="value" id="stat-sent">—</div>
          <span class="unit">BTC</span>
        </div>
        <div class="stat-card">
          <div class="label">Transazioni totali</div>
          <div class="value" id="stat-txcount">—</div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('graph')">Grafo Connessioni</button>
        <button class="tab-btn" onclick="switchTab('table')">Transazioni</button>
      </div>

      <div id="tab-graph" class="tab-content active">
        <div id="graph-container"></div>
      </div>
      <div id="tab-table" class="tab-content">
        <table>
          <thead>
            <tr><th>Data</th><th>TXID</th><th>Importo</th><th>Tipo</th></tr>
          </thead>
          <tbody id="tx-tbody"></tbody>
        </table>
      </div>
    </div>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
